<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Yuan Wang — writing on AI, quant, signal</title>

    <!-- DNS Prefetch & Preconnect -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Yuan Wang — notes on AI, quantitative research, and signal processing." />
    <meta name="format-detection" content="telephone=no" />

    <!--
      SPA on GitHub Pages — path-restore + legacy hash redirect.
      Must run before main.tsx so React boots with the correct URL.
      (Adapted from https://github.com/rafgraph/spa-github-pages, MIT.)
    -->
    <script>
      (function () {
        var l = window.location;
        // (1) Decode the path that 404.html packed into the query string.
        if (l.search && l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
        // (2) Backward compatibility: rewrite any legacy /#/article/foo link
        //     to the new clean URL form /article/foo.
        if (l.hash && l.hash.indexOf('#/') === 0) {
          var newPath = l.hash.slice(1) || '/';
          window.history.replaceState(null, '', newPath);
        }
      })();
    </script>

    <!--
      Heading + Body — Inter (400/600)
      Code           — JetBrains Mono (400/500)
      font-display=swap so prose paints immediately.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
