<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Yuan Wang — redirecting…</title>
    <script>
      // SPA on GitHub Pages — redirect script.
      // Encodes the requested path into a query string, then loads "/", where
      // index.html's matching script decodes it back into the real URL via
      // history.replaceState. This gives clean URLs (no `#`) on a static host
      // that doesn't support rewrites.
      // Adapted from https://github.com/rafgraph/spa-github-pages (MIT).
      (function () {
        // 0 for a custom-domain root deploy (ynuwng.com).
        // Bump to 1 if you ever serve from a subpath like user.github.io/repo/.
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
