  <path class="c1" d="M 60 51  L 145 114 L 230 163 L 315 193 L 400 210 L 485 207 L 570 191"/>
  <path class="c2" d="M 60 81  L 145 128 L 230 165 L 315 193 L 400 212 L 485 221 L 570 221"/>
  <path class="c3" d="M 60 93  L 145 133 L 230 168 L 315 193 L 400 214 L 485 226 L 570 233"/>
  <path class="c4" d="M 60 102 L 145 137 L 230 168 L 315 193 L 400 214 L 485 231 L 570 242"/>

  <g transform="translate(415, 50)">
    <line class="c1" x1="0" y1="0" x2="22" y2="0"/>
    <text class="lg" x="28" y="3" fill="#1D9E75">T = 1m</text>
    <line class="c2" x1="0" y1="14" x2="22" y2="14"/>
